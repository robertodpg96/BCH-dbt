name: dbt CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dbt-run:
    name: Run dbt models
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 - Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: bitcoin_cash/requirements.txt

      # Step 3 - Install dbt and dependencies
      - name: Install dbt and dependencies
        run: pip install -r bitcoin_cash/requirements.txt

      # Step 4 - Authenticate with Google Cloud
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      # Step 5 - Write profiles.yml dynamically from secrets
      - name: Create dbt profiles.yml
        working-directory: bitcoin_cash
        run: |
          cat <<EOF > profiles.yml
          bitcoin_cash:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account-json
                project: ${{ secrets.GCP_PROJECT_ID }}
                dataset: bitcoin_cash
                threads: 4
                keyfile_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
                timeout_seconds: 300
                location: ${{ secrets.DBT_BIGQUERY_LOCATION }}
          EOF

      # Step 6 - Parse dbt project
      - name: Parse dbt project
        working-directory: bitcoin_cash
        run: dbt parse --profiles-dir . --target ci

      # Step 7 - Run dbt models
      - name: Run dbt models
        working-directory: bitcoin_cash
        run: dbt run --profiles-dir . --target ci

      # Step 8 - Test dbt models
      - name: Test dbt models
        working-directory: bitcoin_cash
        run: dbt test --profiles-dir . --target ci