name: dbt CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dbt-run:
    name: Run dbt models
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Install dbt and dependencies
        run: pip install -r requirements.txt

      - name: Create dbt profiles.yml
        working-directory: bitcoin_cash
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "bitcoin_cash:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account-json
                project: '${{ secrets.GCP_PROJECT_ID }}'
                dataset: bitcoin_cash
                threads: 4
                keyfile_json: $(echo $GCP_SERVICE_ACCOUNT_KEY | base64 -d)
                timeout_seconds: 300
                location: '${{ secrets.DBT_BIGQUERY_LOCATION }}'" > profiles.yml

      - name: Parse dbt project
        working-directory: bitcoin_cash
        run: dbt parse --profiles-dir . --target ci

      - name: Run dbt models
        working-directory: bitcoin_cash
        run: dbt run --profiles-dir . --target ci

      - name: Test dbt models
        working-directory: bitcoin_cash
        run: dbt test --profiles-dir . --target ci